name: ✨ 功能建议
description: 想要新功能或改进现有功能
title: '[Feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 你遇到了什么不便？现有功能哪里不顺手？
      placeholder: 比如每次改配置都要手动找文件，希望能有搜索框
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的方案
      description: 心里的理想效果长什么样？可以画个草图或描述交互
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 有没有别的实现方式？为什么觉得不合适？

  - type: textarea
    id: context
    attributes:
      label: 补充说明
      description: 其他相关信息、参考链接、截图
